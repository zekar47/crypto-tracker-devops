AWSTemplateFormatVersion: '2010-09-09'
Description: Infraestructura para Crypto Tracker - EC2 y S3

Resources:
  # S3 Bucket para logs o backups
  CryptoAppBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "crypto-tracker-logs-${AWS::AccountId}"

  CryptoSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Permitir trafico HTTP y SSH
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0 # Temporal
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          CidrIp: 0.0.0.0/0

          # Instancia EC2
  CryptoServer:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      KeyName: vockey
      ImageId: ami-098e39bafa7e7303d
      SecurityGroupIds:
        - !Ref CryptoSG

      UserData:
        Fn::Base64: !Sub |
          #!/bin/sh
          # Actualizar e instalar dependencias
          dnf update -y
          dnf install -y git docker

          # Iniciar Docker y permisos
          systemctl start docker
          systemctl enable docker
          usermod -aG docker ec2-user

          # Instalar Docker Compose (V2)
          mkdir -p /usr/local/lib/docker/cli-plugins
          curl -SL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64 -o /usr/local/lib/docker/cli-plugins/docker-compose
          chmod +x /usr/local/lib/docker/cli-plugins/docker-compose

          # Clonar repositorio y configurar Cron
          cd /home/ec2-user
          git clone https://github.com/zekar47/crypto-tracker-devops.git
          chown -R ec2-user:ec2-user crypto-tracker-devops

          # Configurar el cron para el usuario ec2-user
          # Hora temporal, luego revisaré correctamente las diferencias de timezones
          echo "00 08 * * * /home/ec2-user/crypto-tracker-devops/scripts/start_app.sh" >> /var/spool/cron/ec2-user
          echo "00 20 * * * /home/ec2-user/crypto-tracker-devops/scripts/stop_app.sh" >> /var/spool/cron/ec2-user
      Tags:
        - Key: Name
          Value: CryptoTrackerServer
